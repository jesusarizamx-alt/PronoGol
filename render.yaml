services:
  - type: web
    name: soccer-predictor-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
    disk:
      name: glai-data
      mountPath: /opt/render/project/src
      sizeGB: 1
